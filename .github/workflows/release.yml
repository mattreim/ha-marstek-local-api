name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.3.0 or 1.3.0b2)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest tests_integration/ -v --tb=short

      - name: Update manifest version
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' \
            custom_components/marstek_local_api/manifest.json > _tmp.json
          mv _tmp.json custom_components/marstek_local_api/manifest.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/marstek_local_api/manifest.json
          git commit -m "Release ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          generate_release_notes: true
